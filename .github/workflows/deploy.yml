name: Deploy to Lightsail

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "sudo bash /srv/career-evaluation/deploy/deploy.sh"

      - name: Smoke test
        run: |
          sleep 3
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }}/)
          if [[ "$HTTP" != "200" && "$HTTP" != "307" ]]; then
            echo "Smoke test failed: HTTP $HTTP"
            exit 1
          fi
          echo "Deploy smoke test OK (HTTP $HTTP)"
